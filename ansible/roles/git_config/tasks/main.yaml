- name: Set global git username
  become: true
  become_user: "{{ target_user }}"
  git_config:
    name: user.name
    value: "{{ git_user_name }}"
    scope: global

- name: Set global git email
  become: true
  become_user: "{{ target_user }}"
  git_config:
    name: user.email
    value: "{{ git_user_email }}"
    scope: global